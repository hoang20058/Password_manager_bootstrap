<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecurePass | Xác thực</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="container py-5">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="row g-0">
                <div class="col-md-4 bg-light border-end p-5 text-center">
                    <div class="position-relative d-inline-block mb-4">
                        <img src="https://via.placeholder.com/150" class="rounded-circle img-thumbnail shadow-sm"
                            style="width: 150px; height: 150px; object-fit: cover;">
                        <button class="btn btn-primary btn-sm position-absolute bottom-0 end-0 rounded-circle shadow">
                            <i class="fa-solid fa-camera"></i>
                        </button>
                    </div>
                    <h4 class="fw-bold mb-1">miniminZ</h4>
                    <p class="text-muted small mb-3">Software Engineering | PTIT</p>
                    <div
                        class="badge bg-success-subtle text-success border border-success-subtle rounded-pill px-3 py-2">
                        <i class="fa-solid fa-shield-check me-1"></i> Account Secured
                    </div>
                </div>

                <div class="col-md-8 p-5 bg-white">
                    <h5 class="fw-bold mb-4 text-primary">
                        <i class="fa-solid fa-user-gear me-2"></i>Thông tin cá nhân
                    </h5>

                    <form class="row g-4">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control border-0 bg-light shadow-none" id="f_name"
                                    value="Nguyễn Văn A" placeholder="Name">
                                <label for="f_name">Họ và tên</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control border-0 bg-light shadow-none" id="f_user"
                                    value="miniminZ" placeholder="Username">
                                <label for="f_user">Username</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-floating">
                                <input type="email" class="form-control border-0 bg-light shadow-none" id="f_email"
                                    value="contact@example.com" placeholder="Email">
                                <label for="f_email">Địa chỉ Email</label>
                            </div>
                        </div>

                        <div class="col-12 text-end mt-5">
                            <button type="button" class="btn btn-outline-secondary px-4 border-0">Hủy</button>
                            <button type="submit" class="btn btn-primary px-5 py-2 shadow fw-bold">
                                Lưu thay đổi
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
