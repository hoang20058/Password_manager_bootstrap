<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecurePass | Xác thực</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="auth-style.css">
</head>

<body class="d-flex align-items-center justify-content-center">

    <div class="auth-container">
        <div class="auth-card shadow">

            <!-- HEADER -->
            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary">
                    <i class="fas fa-shield-alt"></i> SecurePass
                </h2>
                <p class="text-muted" id="auth-subtitle">Chào mừng bạn trở lại!</p>
            </div>

            <!-- TABS -->
            <ul class="nav nav-pills nav-justified mb-4" id="pills-tab">
                <li class="nav-item">
                    <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#login-content">
                        Đăng nhập
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="pill" data-bs-target="#register-content">
                        Đăng ký
                    </button>
                </li>
            </ul>

            <div class="tab-content">

                <!-- LOGIN -->
                <div class="tab-pane fade show active" id="login-content">
                    <form action="index.html">

                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" name="email" placeholder="Email">
                            <label>Email / Tên người dùng</label>
                        </div>

                        <!-- <div class="form-floating mb-3">
                            <input type="password" class="form-control" name="password" placeholder="Mật khẩu">
                            <label>Mật khẩu</label>
                        </div> -->
                        <div class="input-group mb-3">
                            <div class="form-floating">
                                <input type="password" class="form-control password-field" placeholder="Mật khẩu">
                                <label>Mật khẩu</label>
                            </div>
                            <span class="input-group-text toggle-password">
                                <i class="fas fa-eye"></i>
                            </span>
                        </div>

                        <div class="d-flex justify-content-between mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="remember">
                                <label class="form-check-label small">Ghi nhớ tôi</label>
                            </div>
                            <a href="#" class="small text-decoration-none text-primary">Quên mật khẩu?</a>
                        </div>

                        <!-- FIX: không dùng <a> trong button -->
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                            ĐĂNG NHẬP
                        </button>
                    </form>
                </div>

                <!-- REGISTER -->
                <div class="tab-pane fade" id="register-content">
                    <form action="auth.html">

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" name="name" placeholder="Họ tên">
                            <label>Họ và tên</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" name="email" placeholder="Email">
                            <label>Địa chỉ Email</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" name="password" placeholder="Mật khẩu">
                            <label>Mật khẩu mạnh</label>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                            TẠO TÀI KHOẢN
                        </button>
                    </form>
                </div>

            </div>

            <!-- SOCIAL -->
            <div class="text-center mt-4">
                <p class="text-muted small">Hoặc tiếp tục với</p>
                <div class="d-flex justify-content-center gap-3">
                    <button class="btn btn-outline-secondary rounded-circle social-btn">
                        <i class="fab fa-google"></i>
                    </button>
                    <button class="btn btn-outline-secondary rounded-circle social-btn">
                        <i class="fab fa-apple"></i>
                    </button>
                    <button class="btn btn-outline-secondary rounded-circle social-btn">
                        <i class="fab fa-github"></i>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
