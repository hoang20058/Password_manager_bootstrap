<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Passws</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="auth-style.css">
</head>

<body class="d-flex align-items-center justify-content-center">

    <div class="auth-container">
        <div class="auth-card shadow">

            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary-custom">
                    <i class="fas fa-shield-alt"></i> Passws
                </h2>
                <p class="text-muted">Chào mừng bạn trở lại!</p>
            </div>

            <ul class="nav nav-pills nav-justified mb-4" id="authTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="login-tab" data-bs-toggle="pill" data-bs-target="#login-content" type="button" role="tab">
                        Đăng nhập
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="register-tab" data-bs-toggle="pill" data-bs-target="#register-content" type="button" role="tab">
                        Đăng ký
                    </button>
                </li>
            </ul>

            <div class="tab-content" id="authTabsContent">

                <div class="tab-pane fade show active" id="login-content" role="tabpanel" tabindex="0">
                    <form action="index.html">
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="loginEmail" name="email" placeholder="Email" required>
                            <label for="loginEmail">Email / Tên người dùng</label>
                        </div>

                        <div class="input-group mb-3">
                            <div class="form-floating flex-grow-1">
                                <input type="password" class="form-control password-field" id="loginPassword" placeholder="Mật khẩu" required>
                                <label for="loginPassword">Mật khẩu</label>
                            </div>
                            <span class="input-group-text toggle-password" style="cursor: pointer;">
                                <i class="fas fa-eye"></i>
                            </span>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe" name="remember">
                                <label class="form-check-label small" for="rememberMe">Ghi nhớ tôi</label>
                            </div>
                            <a href="#" class="small text-decoration-none fw-semibold">Quên mật khẩu?</a>
                        </div>

                        <button type="submit" class="btn btn-primary-custom w-100 py-2 fw-bold">
                            ĐĂNG NHẬP
                        </button>
                    </form>
                </div>

                <div class="tab-pane fade" id="register-content" role="tabpanel" tabindex="0">
                    <form action="auth.html">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="regName" name="name" placeholder="Họ tên" required>
                            <label for="regName">Họ và tên</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="regEmail" name="email" placeholder="Email" required>
                            <label for="regEmail">Địa chỉ Email</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="regPassword" name="password" placeholder="Mật khẩu" required>
                            <label for="regPassword">Mật khẩu mạnh</label>
                        </div>

                        <button type="submit" class="btn btn-primary-custom w-100 py-2 fw-bold">
                            TẠO TÀI KHOẢN
                        </button>
                    </form>
                </div>

            </div>

            <div class="text-center mt-4">
                <p class="text-muted small">Hoặc tiếp tục với</p>
                <div class="d-flex justify-content-center gap-3">
                    <button type="button" class="btn btn-outline-secondary rounded-circle social-btn" title="Đăng nhập bằng Google">
                        <i class="fab fa-google"></i>
                    </button>
                    <button type="button" class="btn btn-outline-secondary rounded-circle social-btn" title="Đăng nhập bằng Apple">
                        <i class="fab fa-apple"></i>
                    </button>
                    <button type="button" class="btn btn-outline-secondary rounded-circle social-btn" title="Đăng nhập bằng Github">
                        <i class="fab fa-github"></i>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Xử lý sự kiện ẩn/hiện mật khẩu
        document.querySelector('.toggle-password').addEventListener('click', function () {
            const passwordInput = document.getElementById('loginPassword');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });
    </script>
</body>

</html>
